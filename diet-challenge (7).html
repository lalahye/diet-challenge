<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>🥕 다이어트 챌린지</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;900&display=swap" rel="stylesheet">
<style>
:root {
  --mint:#5CC8A8; --mint-light:#E8F9F3; --mint-dark:#3A9E80;
  --yellow:#FFD166; --yellow-light:#FFF8E6;
  --red:#FF6B6B; --red-light:#FFF0F0;
  --peach:#FF8C69;
  --bg:#FBF9F6; --card:#fff; --text:#2D2D2D; --text-sub:#9B9B9B;
  --border:rgba(0,0,0,0.06); --shadow:0 4px 20px rgba(0,0,0,0.07);
  --shadow-sm:0 2px 8px rgba(0,0,0,0.06);
  --r:20px; --r-sm:14px; --r-pill:99px;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:'Noto Sans KR',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;padding-bottom:48px}
.blob-wrap{position:fixed;inset:0;pointer-events:none;overflow:hidden;z-index:0}
.blob{position:absolute;border-radius:50%;filter:blur(60px);opacity:0.18}
.blob1{width:300px;height:300px;background:var(--mint);top:-80px;right:-60px}
.blob2{width:250px;height:250px;background:var(--yellow);bottom:100px;left:-80px}
.blob3{width:200px;height:200px;background:#B8A9F5;top:40%;right:-60px}
.page{position:relative;z-index:1}
.header{padding:32px 20px 20px;text-align:center}
.header-icon{font-size:44px;display:block;margin-bottom:8px;animation:bounce 2s ease-in-out infinite}
@keyframes bounce{0%,100%{transform:translateY(0)}50%{transform:translateY(-6px)}}
.header h1{font-size:22px;font-weight:900;letter-spacing:-0.5px}
.header p{font-size:13px;color:var(--text-sub);margin-top:5px;line-height:1.6}
.week-nav{display:flex;align-items:center;justify-content:center;gap:12px;padding:0 20px 16px}
.week-btn{width:38px;height:38px;border-radius:50%;border:2px solid var(--border);background:var(--card);cursor:pointer;font-size:18px;color:var(--text-sub);display:flex;align-items:center;justify-content:center;box-shadow:var(--shadow-sm);transition:all .15s}
.week-btn:active{transform:scale(0.92);background:var(--mint-light)}
.week-label{font-size:14px;font-weight:700;background:var(--card);padding:8px 18px;border-radius:var(--r-pill);box-shadow:var(--shadow-sm)}
.summary{display:flex;gap:8px;padding:0 20px 20px;justify-content:center;flex-wrap:wrap}
.pill{display:flex;align-items:center;gap:6px;padding:8px 14px;border-radius:var(--r-pill);font-size:13px;font-weight:700;box-shadow:var(--shadow-sm)}
.pill-mint{background:var(--mint-light);color:var(--mint-dark)}
.pill-yellow{background:var(--yellow-light);color:#B8860B}
.pill-red{background:var(--red-light);color:#C0392B}
.member-card{background:var(--card);border-radius:var(--r);margin:0 16px 14px;box-shadow:var(--shadow);overflow:hidden}
.card-top{padding:16px 16px 12px;display:flex;align-items:flex-start;justify-content:space-between}
.member-left{display:flex;align-items:center;gap:11px}
.avatar{width:44px;height:44px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:22px;overflow:hidden;flex-shrink:0}
.avatar img{width:100%;height:100%;object-fit:cover;border-radius:50%}
.member-info{display:flex;flex-direction:column;gap:5px}
.member-name-btn{font-size:15px;font-weight:700;cursor:pointer;background:none;border:none;font-family:inherit;color:var(--text);display:flex;align-items:center;gap:5px;padding:0}
.name-input{font-size:15px;font-weight:700;border:none;border-bottom:2px solid var(--mint);outline:none;background:transparent;color:var(--text);font-family:inherit;width:90px}
.badges{display:flex;gap:5px;flex-wrap:wrap}
.badge{font-size:10px;font-weight:700;padding:3px 9px;border-radius:var(--r-pill)}
.badge-ok{background:var(--mint-light);color:var(--mint-dark)}
.badge-warn{background:var(--yellow-light);color:#9A6E00}
.badge-fine{background:var(--red-light);color:#C0392B}
.badge-miss{background:#F5F5F5;color:var(--text-sub)}
.warn-tag{font-size:12px;font-weight:700;color:var(--text-sub);background:#F5F5F5;padding:4px 10px;border-radius:var(--r-pill);white-space:nowrap}
.days-area{padding:0 14px 14px}
.days-row{display:grid;grid-template-columns:repeat(5,1fr);gap:7px}
.day-btn{border-radius:var(--r-sm);border:2px solid transparent;background:#F7F6F4;cursor:pointer;padding:10px 4px 8px;display:flex;flex-direction:column;align-items:center;gap:4px;transition:all .18s cubic-bezier(.34,1.56,.64,1)}
.day-btn .day-name{font-size:11px;font-weight:700;color:var(--text-sub)}
.day-btn .day-emoji{font-size:18px;transition:transform .2s}
.day-btn.checked{background:var(--mint-light);border-color:var(--mint)}
.day-btn.checked .day-name{color:var(--mint-dark)}
.day-btn.checked .day-emoji{transform:scale(1.2)}
.day-btn:active{transform:scale(0.93)}
.prog-wrap{height:6px;background:#F0F0F0;border-radius:0 0 var(--r) var(--r);overflow:hidden}
.prog-bar{height:100%;border-radius:0 6px 6px 0;transition:width .4s cubic-bezier(.34,1.2,.64,1)}
.prog-mint{background:linear-gradient(90deg,var(--mint),#7FD9BE)}
.prog-full{background:linear-gradient(90deg,#5CC8A8,#FFD166)}
.motiv{text-align:center;font-size:12px;color:var(--text-sub);padding:6px 16px 14px;font-weight:500}
.save-area{padding:4px 16px 8px}
.save-btn{width:100%;padding:16px;background:linear-gradient(135deg,var(--mint),#7FD9BE);color:#fff;border:none;border-radius:var(--r);font-size:15px;font-weight:700;cursor:pointer;font-family:inherit;box-shadow:0 4px 14px rgba(92,200,168,.4);transition:all .18s;display:flex;align-items:center;justify-content:center;gap:8px}
.save-btn:active{transform:scale(0.97)}
.section-label{font-size:13px;font-weight:700;color:var(--text-sub);padding:16px 20px 10px;display:flex;align-items:center;gap:6px}
.history-card{background:var(--card);border-radius:var(--r);margin:0 16px;box-shadow:var(--shadow);overflow:hidden}
.h-head{display:grid;grid-template-columns:1fr 48px 44px 56px;padding:10px 16px;background:#FAFAFA;font-size:11px;font-weight:700;color:var(--text-sub);border-bottom:1px solid var(--border)}
.h-row{display:grid;grid-template-columns:1fr 48px 44px 56px;padding:11px 16px;border-bottom:1px solid var(--border);font-size:13px;align-items:center}
.h-row:last-child{border-bottom:none}
.r-ok{color:var(--mint-dark);font-weight:700}
.r-miss{color:var(--peach);font-weight:700}
.warn-history-card{background:var(--card);border-radius:var(--r);margin:0 16px;box-shadow:var(--shadow);overflow:hidden}
.wh-head{display:grid;grid-template-columns:70px 1fr 1fr 1fr;padding:10px 16px;background:#FFF8E6;font-size:11px;font-weight:700;color:#9A6E00;border-bottom:1px solid var(--border)}
.wh-row{display:grid;grid-template-columns:70px 1fr 1fr 1fr;padding:11px 16px;border-bottom:1px solid var(--border);font-size:13px;align-items:center}
.wh-row:last-child{border-bottom:none}
.wcell{display:inline-flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;padding:3px 8px;border-radius:var(--r-pill)}
.wcell-warn{background:var(--yellow-light);color:#9A6E00}
.wcell-fine{background:var(--red-light);color:#C0392B}
.wcell-ok{color:var(--text-sub)}
.empty-msg{text-align:center;padding:28px;color:var(--text-sub);font-size:13px}
.reset-btn{display:block;margin:16px auto 0;background:transparent;border:none;color:#CCC;font-size:11px;cursor:pointer;font-family:inherit;padding:8px 16px}
.toast{position:fixed;bottom:28px;left:50%;transform:translateX(-50%) translateY(80px);background:#2D2D2D;color:#fff;padding:13px 22px;border-radius:var(--r-pill);font-size:13px;font-weight:700;white-space:nowrap;z-index:999;transition:transform .35s cubic-bezier(.34,1.56,.64,1);box-shadow:0 8px 24px rgba(0,0,0,.18)}
.toast.show{transform:translateX(-50%) translateY(0)}
.loading{text-align:center;padding:60px 20px}
.spin{width:32px;height:32px;border:3px solid #EEE;border-top-color:var(--mint);border-radius:50%;animation:spin .7s linear infinite;margin:0 auto 14px}
@keyframes spin{to{transform:rotate(360deg)}}
.loading p{color:var(--text-sub);font-size:14px}
@media(max-width:360px){.day-btn{padding:8px 2px 6px}.day-btn .day-emoji{font-size:16px}}
</style>
</head>

  <div class="header">

</div>

let weekOffset = 0;
let liveData = null;
let unsub = null;
let settings = null;

function getMon(offset) {
  const now = new Date();
  const day = now.getDay();
  const diff = day === 0 ? -6 : 1 - day;
  const d = new Date(now);
  d.setDate(now.getDate() + diff + offset * 7);
  d.setHours(0,0,0,0);
  return d;
}
function weekKey(offset) { return getMon(offset).toISOString().slice(0,10); }
function weekLabel(offset) {
  const d = getMon(offset);
  const e = new Date(d);
  e.setDate(d.getDate() + 6);
  const f = x => (x.getMonth()+1) + '/' + x.getDate();
  return d.getFullYear() + '년 ' + f(d) + ' ~ ' + f(e);
}

const wRef = wk => doc(db,'weeks',wk);
const sRef = () => doc(db,'settings','members');

async function loadSettings() {
  const snap = await getDoc(sRef());
  if (snap.exists()) return snap.data();
  const def = { names: [...DEFAULT_NAMES], warnings: [0,0,0] };
  await setDoc(sRef(), def);
  return def;
}
async function saveSettings(s) { await setDoc(sRef(), s); }

function subscribeWeek(wk) {
  if (unsub) unsub();
  unsub = onSnapshot(wRef(wk), snap => {
    const raw = snap.exists() ? snap.data() : {};
    const checks = [0,1,2].map(i => raw['m'+i] || [false,false,false,false,false]);
    liveData = { checks, saved: raw.saved || false };
    render(wk);
  });
}

function avatarHTML(i) {
  const av = AVATARS[i];
  if (av.type === 'emoji') {
    return '<div class="avatar" style="background:' + av.bg + '"><span style="font-size:22px">' + av.val + '</span></div>';
  }
  return '<div class="avatar" style="background:' + av.bg + '"><img src="' + av.val + '" alt="루피"></div>';
}

function render(wk) {
  document.getElementById('weekLabel').textContent = weekLabel(weekOffset);
  if (!liveData) return;

  const checks = liveData.checks;

    let dayBtns = '';

      const on = checks[i][j];
      dayBtns += '<button class="day-btn' + (on ? ' checked' : '') + '" data-m="' + i + '" data-d="' + j + '">'
        + '<span class="day-emoji">' + (on ? EMOJIS_ON[j] : EMOJIS_OFF[j]) + '</span>'
        + '<span class="day-name">' + DAYS[j] + '</span>'
        + '</button>';
    }

    const motiv = MOTIVS[i][Math.min(cnt, MOTIVS[i].length - 1)];

    cards += '<div class="member-card">'
      + '<div class="card-top"><div class="member-left">'
      + avatarHTML(i)
      + '<div class="member-info">'
      + '<button class="member-name-btn" data-rename="' + i + '">' + names[i] + ' <span style="font-size:11px;opacity:.4">✏️</span></button>'
      + '<div class="badges">' + badge + '</div>'
      + '</div></div>'
      + '<div class="warn-tag">경고 ' + w + '회</div>'
      + '</div>'
      + '<div class="days-area"><div class="days-row">' + dayBtns + '</div></div>'
      + '<div class="motiv">' + motiv + '</div>'
      + '<div class="prog-wrap"><div class="prog-bar ' + (met ? 'prog-full' : 'prog-mint') + '" style="width:' + prog + '%"></div></div>'
      + '</div>';
  }

  const html = '<div class="summary">'
    + '<div class="pill pill-mint">🏆 ' + doneCount + '/3명 달성</div>'
    + '<div class="pill pill-yellow">⚠️ 경고 ' + warnCount + '명</div>'
    + '<div class="pill pill-red">💸 벌금 ' + fineCount + '명</div>'
    + '</div>'
    + cards
    + '<div class="save-area"><button class="save-btn" id="saveBtn">'
    + (saved ? '🔄 재저장하기' : '📅 이번 주 점검 저장')
    + '</button></div>'
    + '<div class="section-label">⚠️ 경고 기록</div>'
    + '<div class="warn-history-card" id="warnHistory"><div class="empty-msg">불러오는 중 🌿</div></div>'
    + '<div class="section-label">📋 전체 기록</div>'
    + '<div class="history-card" id="fullHistory"><div class="empty-msg">불러오는 중 🌿</div></div>'
    + '<button class="reset-btn" id="resetBtn">경고 기록 초기화</button>';

  document.getElementById('app').innerHTML = html;

  document.getElementById('saveBtn').addEventListener('click', () => saveWeek(wk));
  document.getElementById('resetBtn').addEventListener('click', () => resetWarnings(wk));

  document.querySelectorAll('.day-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      const mi = parseInt(btn.dataset.m);
      const di = parseInt(btn.dataset.d);
      toggleDay(mi, di, wk);
    });
  });

  document.querySelectorAll('[data-rename]').forEach(btn => {
    btn.addEventListener('click', () => {
      const idx = parseInt(btn.dataset.rename);
      startRename(idx, wk);
    });
  });

  loadWarnHistory();
  loadFullHistory();
}

async function toggleDay(mi, di, wk) {
  if (!liveData) return;
  const checks = liveData.checks.map(a => [...a]);
  const wasOn = checks[mi][di];
  checks[mi][di] = !wasOn;
  const payload = {};
  checks.forEach((a, i) => { payload['m'+i] = a; });
  await setDoc(wRef(wk), payload, { merge: true });
  if (!wasOn) {
    const msgs = ['잘했어요! 💪','오늘도 운동 완료! 🔥','멋져요! ⚡','꾸준함이 힘! 🌟','운동 체크! 🏃'];
    showToast(msgs[Math.floor(Math.random() * msgs.length)]);
  }
}

async function saveWeek(wk) {
  if (!liveData) return;
  const newW = [...settings.warnings];
  let anyMiss = false;
  const warnedList = [];
  liveData.checks.forEach((a, i) => {
    if (a.filter(Boolean).length < GOAL) {
      newW[i]++;
      anyMiss = true;
      warnedList.push({ memberIdx: i, warnCount: newW[i] });
    }
  });
  settings.warnings = newW;
  await saveSettings(settings);
  await setDoc(wRef(wk), { saved: true }, { merge: true });
  if (warnedList.length > 0) {
    await setDoc(doc(db,'warningHistory',wk), { weekKey: wk, warned: warnedList }, { merge: true });
  }
  showToast(anyMiss ? '저장! 목표 미달 멤버 경고 추가 ⚠️' : '모두 목표 달성! 최고예요 🎉');
  render(wk);
}

async function resetWarnings(wk) {
  if (!confirm('경고 기록을 모두 초기화할까요?')) return;
  settings.warnings = [0,0,0];
  await saveSettings(settings);
  showToast('초기화 완료 🌱');
  render(wk);
}

function startRename(idx, wk) {
  const btns = document.querySelectorAll('[data-rename]');
  const btn = btns[idx];
  if (!btn) return;
  const input = document.createElement('input');
  input.className = 'name-input';
  input.value = settings.names[idx];
  input.maxLength = 8;
  btn.replaceWith(input);
  input.focus();
  input.select();
  const done = async () => {
    const val = input.value.trim() || settings.names[idx];
    settings.names[idx] = val;
    await saveSettings(settings);
    render(wk);
  };
  input.addEventListener('blur', done);
  input.addEventListener('keydown', e => { if (e.key === 'Enter') input.blur(); });
}

async function loadWarnHistory() {
  try {
    const snap = await getDocs(collection(db,'warningHistory'));
    const rows = [];
    snap.forEach(d => {
      const data = d.data();
      const wk = d.id;
      const dt = new Date(wk);
      const label = (dt.getMonth()+1) + '/' + dt.getDate() + ' 주';
      rows.push({ label, wk, warned: data.warned || [] });
    });
    rows.sort((a,b) => b.wk.localeCompare(a.wk));

    const el = document.getElementById('warnHistory');
    if (!el) return;
    if (!rows.length) {
      el.innerHTML = '<div class="empty-msg">아직 경고 기록이 없어요 🥳<br>모두 목표 달성 중!</div>';
      return;
    }

    const names = settings.names;
    let html = '<div class="wh-head"><div>주차</div>';
    names.forEach(n => { html += '<div>' + n + '</div>'; });
    html += '</div>';

    rows.forEach(row => {
      html += '<div class="wh-row"><div style="font-size:11px;color:var(--text-sub)">' + row.label + '</div>';
      for (let i = 0; i < 3; i++) {
        const entry = row.warned.find(w => w.memberIdx === i);
        if (entry) {
          if (entry.warnCount >= 2) {
            html += '<div><span class="wcell wcell-fine">💸 ' + entry.warnCount + '회</span></div>';
          } else {
            html += '<div><span class="wcell wcell-warn">⚠️ 1회</span></div>';
          }
        } else {
          html += '<div><span class="wcell-ok">-</span></div>';
        }
      }
      html += '</div>';
    });

    el.innerHTML = html;
  } catch(e) {
    const el = document.getElementById('warnHistory');
    if (el) el.innerHTML = '<div class="empty-msg">불러올 수 없어요</div>';
  }
}

async function loadFullHistory() {
  try {
    const snap = await getDocs(collection(db,'weeks'));
    const rows = [];
    snap.forEach(d => {
      const wk = d.id;
      const data = d.data();
      const dt = new Date(wk);
      const label = (dt.getMonth()+1) + '/' + dt.getDate() + ' 주';
      for (let i = 0; i < 3; i++) {
        const arr = data['m'+i] || [];
        const cnt = arr.filter(Boolean).length;
        rows.push({ wk, label, name: settings.names[i], cnt, met: cnt >= GOAL });
      }
    });
    rows.sort((a,b) => b.wk.localeCompare(a.wk));

    const el = document.getElementById('fullHistory');
    if (!el) return;
    if (!rows.length) {
      el.innerHTML = '<div class="empty-msg">아직 기록이 없어요 🌱<br>저장 버튼을 눌러 기록을 남겨보세요!</div>';
      return;
    }

    let html = '<div class="h-head"><div>주차 / 이름</div><div>횟수</div><div>결과</div><div>경고</div></div>';
    rows.forEach(r => {
      html += '<div class="h-row">'
        + '<div><div style="font-weight:700">' + r.name + '</div><div style="font-size:11px;color:var(--text-sub)">' + r.label + '</div></div>'
        + '<div>' + r.cnt + '회</div>'
        + '<div class="' + (r.met ? 'r-ok' : 'r-miss') + '">' + (r.met ? '✅' : '❌') + '</div>'
        + '<div>-</div>'
        + '</div>';
    });
    el.innerHTML = html;
  } catch(e) {
    const el = document.getElementById('fullHistory');
    if (el) el.innerHTML = '<div class="empty-msg">기록을 불러올 수 없어요</div>';
  }
}

function showToast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  clearTimeout(el._t);
  el._t = setTimeout(() => el.classList.remove('show'), 2600);
}

document.getElementById('prevBtn').addEventListener('click', async () => {
  weekOffset--;
  document.getElementById('weekLabel').textContent = weekLabel(weekOffset);
  settings = await loadSettings();
  subscribeWeek(weekKey(weekOffset));
});
document.getElementById('nextBtn').addEventListener('click', async () => {
  weekOffset++;
  document.getElementById('weekLabel').textContent = weekLabel(weekOffset);
  settings = await loadSettings();
  subscribeWeek(weekKey(weekOffset));
});

(async () => {
  try {
    settings = await loadSettings();
    subscribeWeek(weekKey(0));
  } catch(e) {
    document.getElementById('app').innerHTML = '<div class="loading"><p>⚠️ 연결 실패: ' + e.message + '</p></div>';
  }
})();
</script>
